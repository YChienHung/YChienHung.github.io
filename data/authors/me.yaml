bio: "Hi, my name is Jianhong Yang(杨建宏). I am currently a first-year Ph.D. student of the joint doctoral program between [University of Science and Technology of China](en.ustc.edu.cn) and [Eastern Institute of Technology, Ningbo](www.eitech.edu.cn/en), under the supervision of Prof. [Yifan Zhao](faculty.eitech.edu.cn/engineering/zyf_en/main.htm). Prior of this, I received my M.S. degree in Control Engineering from Shandong University, where I was a member of [VSISLab](www.vsislab.com) supervised by Prof. [Wei Zhang](brain.sdu.edu.cn/info/1092/1093.htm) and Prof. [Xiao Jia](faculty.sdu.edu.cn/jiaxiao/zh_CN/index.htm). I received my B.S. degree in Robotics Engineering from Shandong University of Science and Technology."
